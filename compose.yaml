# m1 is microservice 1
# m2 is microservice 2
# auth is authentication/authorization
# web is frontend

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "1000:1000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - m_network

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile.dev
    depends_on:
      auth-db:
        condition: service_healthy
    restart: always
    env_file: 
      - ./auth/.env
    ports:
      - "4000:4000"
    networks:
      - m_network
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - ./auth:/app
      - auth_node_modules:/app/node_modules

  auth-db:
    image: postgres:18
    restart: always
    env_file:
      - ./auth/.env
    ports:
      - "5432:5432" 
    networks:
      - m_network
    volumes:
      - auth_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  m1:
    build:
      context: ./m1
      dockerfile: Dockerfil.dev
    depends_on:
      m1-db:
        condition: service_healthy
    restart: always
    env_file:
      - ./m1/.env.dev
    ports:
      - "3000:3000"
    networks:
      - m-network
    develop:
      watch:
        - action: sync
          path: ./auth/src
          target: /app/src
          action: sync

  m1-db:
    image: postgres:18
    restart: always
    env_file:
      - ./m1/.env.dev
    ports:
      - "5430:5432" 
    networks:
      - m_network
    volumes:
      - m1_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  m2-db:
    image: postgres:18
    restart: always
    env_file:
      - ./m2/.env.dev
    ports:
      - "5431:5432" 
    networks:
      - m_network
    volumes:
      - m2_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
  
networks:
  m_network:
    driver: bridge

volumes:
  web_node_modules:
  auth_node_modules:
  auth_db_data:
  m1_db_data:
  m2_db_data:
  